<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wonders Log</title>
    <style>
        :root {
            --dusty-olive: #797d62ff;
            --palm-leaf: #9b9b7aff;
            --desert-sand: #d9ae94ff;
            --soft-peach: #f1dca7ff;
            --golden-pollen: #ffcb69ff;
            --toasted-almond: #d08c60ff;
            --dusty-taupe: #997b66ff;
        }

        body {
            background-color: dimgray;
        }

        #main-con {
            background-color: var(--dusty-taupe);
            border-radius: 30px;     
            padding: 0.01px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .head-con {
            background-color: var(--palm-leaf);
            border-radius: 30px 30px 10px 10px;
            color: var(--soft-peach);
            text-align: center;
            padding: 10px;
            align-items: center;
            margin-bottom: 2px;
        }
        .mid-con {
            display: flex;
            justify-content: flex-start;
            gap: 5px;
            align-content: center;
        }
        .side-con {
            background-color: var(--palm-leaf);
            color: var(--soft-peach);
            width: 18%;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            justify-content: center;
            gap: 5px
        }

        #home-page {
            user-select: none;
            cursor: pointer;
        }

        #about-page {
            user-select: none;
            cursor: pointer;
        }

        .contact {
            font-size: small;
            margin-top: 40px;
        }

        .content {
            background-color: var(--palm-leaf);
            width: 78%;
            border-radius: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding: 5px;
        }
        .wonder-con {
            display: flex;
            gap: 4px;
            overflow: auto;
            resize: both;
            flex-wrap: wrap;
            margin-top: 2vh;
        }

        .content h1 {
            color: var(--soft-peach);
            font-size: 20px;
            text-align: center;

        }

        #wonder {
            min-width: 30vh;
            background-color: var(--dusty-olive);
            min-height: 30vh;
            border-radius: 10px;
            user-select: none;
            cursor: pointer;
        }

        #wonder.china {
            background-image: url(src/GreatWallNearBeijingWinter.jpg);
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
        }
        #wonder.egypt {
            background-image: url(src/Kheops-Pyramid.jpg);
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
        }
         #wonder.italy {
            background-image: url(src/Colosseum_in_Rome\,_Italy_-_April_2007.jpg);
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
        }
         #wonder.jordan {
            background-image: url(src/Al_khazneh.jpg);
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
        }
         #wonder.brazil {
            background-image: url(src/Cristo_Redentor_-_Rio_de_Janeiro\,_Brasil.jpg);
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
        }
         #wonder.peru {
            background-image: url(src/Peru_Machu_Picchu_Sunrise.jpg);
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
        }
         #wonder.india {
            background-image: url(src/TajMahalbyAmalMongia.jpg);
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
        }
         #wonder.mexico {
            background-image: url(src/Chichen_Itza_\(3326547826\).jpg);
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
        }

        #wonder h1 {
            font-size: 10px;
        }

        .foot-con p {
            text-align: center;
            font-weight:bold;
            align-content: center;
        }
    </style>
    <script>
        function gotoabout() {
            window.location.href = 'about-page.html';
        }
        function gotohome(){
            window.location.href = 'index.html'
        }
        function gotobrazil(){
            window.location.href = 'brazil.html'
        }
        function gotochina(){
            window.location.href = 'china.html'
        }
        function gotoegypt(){
            window.location.href = 'egypt.html'
        }
        function gotoindia(){
            window.location.href = 'india.html'
        }
        function gotoitaly(){
            window.location.href = 'italy.html'
        }
        function gotojordan(){
            window.location.href = 'jordan.html'
        }
        function gotomexico(){
            window.location.href = 'mexico.html'
        }
        function gotoperu(){
            window.location.href = 'peru.html'
        }
    </script>
</head>
<body>
    <div id="main-con">
        <div class="head-con">
            <h1>Wonders Project</h1>
        </div>
        <div class="mid-con">
        <div class="side-con">
            <div id="home-page" role="button" onclick="gotohome()"><h4>Home</h4></div>
            <div id="about-page" role="button" onclick="gotoabout()"><h4>About</h4></div>
            <div class="contact">+62 01921079221<br>231011450165</div>
        </div>
        <div class="content">
            <h1>The Wonders</h1>
            <div class="wonder-con">
                <div id="wonder" class="china" role="button" onclick="gotochina()">
                    <h1>Great Wall of China</h1>
                </div>
                <div id="wonder" class="egypt" role="button" onclick="gotoegypt()">
                    <h1>Giza Pyramids</h1>
                </div>
                <div id="wonder" class="italy" role="button" onclick="gotoitaly()">
                    <h1>Colloseum</h1>
                </div>
                <div id="wonder" class="jordan" role="button" onclick="gotojordan()">
                    <h1>Petra</h1>
                </div>
                <div id="wonder" class="brazil" role="button" onclick="gotobrazil()">
                    <h1>Cristo Redentor</h1>
                </div>
                <div id="wonder" class="peru" role="button" onclick="gotoperu()">
                    <h1>Machu Piccu</h1>
                </div>
                <div id="wonder" class="india" role="button" onclick="gotoindia()">
                    <h1>Taj Mahal</h1>
                </div>
                <div id="wonder" class="mexico" role="button" onclick="gotomexico()">
                    <h1>Chicen Itza</h1>
                </div>
            </div>
        </div>
        </div>
        <div class="foot-con"><p>Copyright to Omar Muhammad Rafly</p></div>
    </div>
</body>
</html>
